<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% assign seo_title = page.seo_title | default: page.title %}
  <title>{{ seo_title }} | {{ site.title }}</title>

  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#ff8000">

  <!-- Canonical -->
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- CSS -->
  <link rel="preload" as="style" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Open Graph (Pinterest/FB) -->
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ seo_title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  {% if page.og_image %}
    <meta property="og:image" content="{{ page.og_image | absolute_url }}">
  {% elsif site.og_image %}
    <meta property="og:image" content="{{ site.og_image | absolute_url }}">
  {% endif %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ seo_title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  {% if page.og_image %}
    <meta name="twitter:image" content="{{ page.og_image | absolute_url }}">
  {% elsif site.og_image %}
    <meta name="twitter:image" content="{{ site.og_image | absolute_url }}">
  {% endif %}

  <!-- (Opzionale) Favicon -->
  <!-- <link rel="icon" href="{{ '/assets/favicon.ico' | relative_url }}"> -->
</head>

<body>
  {% include header.html %}

  <main class="page-content" aria-label="Content">
    {{ content }}
  </main>

  {% include footer.html %}
</body>
</html>
