<footer class="site-footer">
    <div class="wrapper">
        <div class="footer-col-wrapper">
            
            <div class="footer-col info-col">
                <p class="footer-heading">{{ site.title }}</p>
                <p>{{ site.description }}</p>
            </div>

            <div class="footer-col link-col">
                <p class="footer-heading">Navigazione</p>
                <ul class="footer-links">
                    <li><a href="{{ '/about/' | relative_url }}">Chi Siamo (About)</a></li>
                    <li><a href="{{ '/privacy-policy/' | relative_url }}">Privacy Policy</a></li>
                    <li><a href="{{ '/disclaimer/' | relative_url }}">Disclaimer Affiliazioni</a></li>
                </ul>
            </div>

            <div class="footer-col social-col">
                <p class="footer-heading">Seguici su</p>
                <ul class="social-links">
                    <li><a href="https://pinterest.com/" target="_blank" rel="noopener">📌 Pinterest</a></li>
                </ul>
            </div>
            
        </div>
        <div class="footer-bottom">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. Tutti i diritti riservati.</p>
        </div>
    </div>
</footer>
